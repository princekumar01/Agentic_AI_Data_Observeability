version: "3.9"

networks:
  clinical_net:
    driver: bridge

services:

  # ─────────────────────────────────────────────
  #  Zookeeper
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - clinical_net
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────
  #  Kafka
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - clinical_net
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  #  Hospital API Simulator
  # ─────────────────────────────────────────────
  hospital_api_simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulator
    container_name: hospital_api_simulator
    networks:
      - clinical_net
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8888:8888"
    volumes:
      - ./data/clinical:/app/data/clinical
      - ./output:/app/output
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      FASTAPI_URL: http://host.docker.internal:8000
      DATA_MODE: csv
      INTER_EVENT_DELAY_MS: 50
      SCENARIO: normal
      ROWS: 500
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure

  # ─────────────────────────────────────────────
  #  Synthea (optional — activate with --profile synthea)
  # ─────────────────────────────────────────────
  synthea:
    image: synthetichealth/syntheticmass:latest
    container_name: synthea
    networks:
      - clinical_net
    ports:
      - "8080:8080"
    profiles:
      - synthea
